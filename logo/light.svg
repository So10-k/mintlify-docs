<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 64" width="380" height="64" role="img" aria-label="Mia's Quiz Tournament">
  <style>
    .wm { font-family: "Fredoka", "Quicksand", "Trebuchet MS", system-ui, sans-serif; font-weight: 700; fill: #1B2A4E; }
    .wm-sub { font-family: "Fredoka", "Quicksand", "Trebuchet MS", system-ui, sans-serif; font-weight: 600; fill: #E94B7E; letter-spacing: 0.22em; text-transform: uppercase; }
  </style>
  <!-- Sun mascot at left -->
  <g transform="translate(0, 0)">
    <!-- rays -->
    <g stroke="#1B2A4E" stroke-width="3.5" stroke-linecap="round" fill="none">
      <line x1="32" y1="3"  x2="32" y2="11"/>
      <line x1="32" y1="53" x2="32" y2="61"/>
      <line x1="3"  y1="32" x2="11" y2="32"/>
      <line x1="53" y1="32" x2="61" y2="32"/>
      <line x1="11.5" y1="11.5" x2="17"   y2="17"/>
      <line x1="47"   y1="47"   x2="52.5" y2="52.5"/>
      <line x1="11.5" y1="52.5" x2="17"   y2="47"/>
      <line x1="47"   y1="17"   x2="52.5" y2="11.5"/>
    </g>
    <circle cx="32" cy="32" r="20" fill="#FFD93D" stroke="#1B2A4E" stroke-width="3.5"/>
    <circle cx="22" cy="34" r="3" fill="#FF6B9D" opacity="0.7"/>
    <circle cx="42" cy="34" r="3" fill="#FF6B9D" opacity="0.7"/>
    <circle cx="25" cy="28" r="2.6" fill="#1B2A4E"/>
    <circle cx="39" cy="28" r="2.6" fill="#1B2A4E"/>
    <path d="M23 36 Q32 44 41 36" fill="none" stroke="#1B2A4E" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="76" y="34" class="wm" font-size="26">Mia&apos;s Quiz</text>
  <text x="76" y="52" class="wm-sub" font-size="10">Tournament Docs</text>
</svg>
